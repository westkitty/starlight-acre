<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Starlight Acre Logo - Vector Source -->
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B87333;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="tealGlow">
      <stop offset="0%" style="stop-color:#2E8B8B;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2E8B8B;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Outer Orbital Ring -->
  <ellipse cx="200" cy="200" rx="180" ry="60" fill="none" stroke="#708090" stroke-width="4" transform="rotate(-15, 200, 200)" />
  
  <!-- Inner Orbital Ring -->
  <ellipse cx="200" cy="200" rx="140" ry="40" fill="none" stroke="#D4AF37" stroke-width="2" transform="rotate(10, 200, 200)" />
  
  <!-- Glow -->
  <circle cx="200" cy="200" r="80" fill="url(#tealGlow)" />
  
  <!-- Star-Fruit Core -->
  <path d="M200,120 L220,180 L280,180 L230,220 L250,280 L200,240 L150,280 L170,220 L120,180 L180,180 Z" fill="url(#goldGrad)" />
  
  <!-- Highlights -->
  <circle cx="200" cy="200" r="10" fill="#F5F5DC" opacity="0.6" />
  
  <!-- Text Placeholder area -->
  <!-- Note: Fonts not embedded, recommend Montserrat or Inter -->
</svg>
